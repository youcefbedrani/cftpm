services:
  db:
    image: postgres:16-alpine
    container_name: cftmp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cftmp}
      POSTGRES_USER: ${POSTGRES_USER:-cftmp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-dev-pass-only}
    volumes:
      - cftmp_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cftmp} -d ${POSTGRES_DB:-cftmp}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cftmp_pgdata:
